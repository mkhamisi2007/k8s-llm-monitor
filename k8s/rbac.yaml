apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-monitor
  namespace: cluster-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-monitor-reader
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - events
      - namespaces
      - services
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-monitor-reader
subjects:
  - kind: ServiceAccount
    name: cluster-monitor
    namespace: cluster-monitor
roleRef:
  kind: ClusterRole
  name: cluster-monitor-reader
  apiGroup: rbac.authorization.k8s.io
